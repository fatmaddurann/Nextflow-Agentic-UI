name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: nextflow-agentic-ui/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: nextflow-agentic-ui/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
